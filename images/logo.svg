<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192" role="img" aria-label="IDexchange logo">
  <!-- White background -->
  <rect width="192" height="192" fill="#ffffff"/>

  <!-- Outer border — dark plum, matches --primary: hsl(315,42%,12%) -->
  <rect x="5" y="5" width="182" height="182"
        fill="none" stroke="#2b1225" stroke-width="9"/>

  <!-- Inner grid — vertical dividers, light lavender -->
  <line x1="66"  y1="5"  x2="66"  y2="187" stroke="#c4a0be" stroke-width="1.5"/>
  <line x1="126" y1="5"  x2="126" y2="187" stroke="#c4a0be" stroke-width="1.5"/>

  <!-- Inner grid — horizontal dividers -->
  <line x1="5"  y1="66"  x2="187" y2="66"  stroke="#c4a0be" stroke-width="1.5"/>
  <line x1="5"  y1="126" x2="187" y2="126" stroke="#c4a0be" stroke-width="1.5"/>

  <!-- "ID" logotype — bold, centered, bottom two-thirds of grid -->
  <text x="96" y="150"
        font-family="'Arial Black', 'Arial Bold', 'Helvetica Neue', Arial, sans-serif"
        font-size="86"
        font-weight="900"
        fill="#2b1225"
        text-anchor="middle"
        dominant-baseline="auto">ID</text>
</svg>
