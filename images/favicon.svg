<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- White background -->
  <rect width="32" height="32" fill="#ffffff"/>

  <!-- Outer border -->
  <rect x="1" y="1" width="30" height="30"
        fill="none" stroke="#2b1225" stroke-width="2"/>

  <!-- Grid vertical lines -->
  <line x1="11" y1="1"  x2="11" y2="31" stroke="#c4a0be" stroke-width="0.75"/>
  <line x1="21" y1="1"  x2="21" y2="31" stroke="#c4a0be" stroke-width="0.75"/>

  <!-- Grid horizontal lines -->
  <line x1="1"  y1="11" x2="31" y2="11" stroke="#c4a0be" stroke-width="0.75"/>
  <line x1="1"  y1="21" x2="31" y2="21" stroke="#c4a0be" stroke-width="0.75"/>

  <!-- "ID" text -->
  <text x="16" y="25"
        font-family="'Arial Black', 'Arial Bold', Arial, sans-serif"
        font-size="15"
        font-weight="900"
        fill="#2b1225"
        text-anchor="middle">ID</text>
</svg>
